<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Change Log</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f7f9fb;
    }
    .latest {
      border-left: 5px solid #28a745;
      background-color: #e9f9ee;
    }
    .badge-new {
      font-size: 0.75rem;
      background-color: #28a745;
    }
  </style>
</head>
<body class="p-3">
  <h4 class="mb-3">Change Log</h4>
  <div id="changelog"></div>

  <script>
    const fs = require('fs');
    const path = require('path');

    const changelogPath = path.join(__dirname, 'changelog.json');
    const data = JSON.parse(fs.readFileSync(changelogPath, 'utf-8'));
    data.reverse();

    const container = document.getElementById('changelog');

    container.innerHTML = data.map((item, index) => `
      <div class="mb-3 p-3 border rounded shadow-sm ${index === 0 ? 'latest' : 'bg-white'}">
        <div class="d-flex align-items-center justify-content-between">
          <h6 class="mb-0">
            Version ${item.version}
            ${index === 0 ? '<span class="badge badge-new ms-2">✨ Latest</span>' : ''}
          </h6>
          <small class="text-muted">${item.date}</small>
        </div>
        <ul class="mt-2 mb-0">${item.changes.map(c => `<li>${c}</li>`).join('')}</ul>
      </div>
    `).join('');
  </script>
</body>
</html>
