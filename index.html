<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SKYBIZ Print Service</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="node_modules/@fortawesome/fontawesome-free/css/all.css" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <div class="container mt-2 mb-2">
    <!-- CONFIGURATION -->
    <div class="row justify-content-center mb-4">
      <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-4 mb-4">
          <div class="card-body p-5 text-center">
            <h4 class="card-title text-center fw-bold text-primary">
              SKYBIZ Print Service
            </h4>
            <span class="text-muted">
              Version <span id="appVersion"></span>
            </span>
          </div>
        </div>
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4">
            <h5 class="card-title text-left mb-4 fw-bold">Configuration</h5>

            <form id="configForm">
              <div class="mb-3">
                <label for="deviceId" class="form-label fw-semibold">Device ID</label>
                <span class="text-danger" title="MAC Address" id="btnMACAddress"><i class="fa fa-desktop" aria-hidden="true"></i></span>
                <input type="text" class="form-control" id="deviceId" placeholder="Enter device ID" required />
              </div>

              <div class="mb-3">
                <label for="wsServer" class="form-label fw-semibold">WebSocket Server</label>
                <input type="text" class="form-control" id="wsServer" placeholder="wss://example.com:1234" />
              </div>

              <div class="d-flex gap-2">
                <button type="button" id="btnSaveConfig" class="btn btn-primary rounded-pill shadow-sm">
                  <i class="fa fa-cog"></i> Save Configuration
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4">
            <ul class="nav nav-tabs">
              <li class="nav-item">
                <a class="nav-link active" data-bs-toggle="tab" href="#tab-printer-testing">Printer Testing</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#tab-edc-testing">EDC Testing</a>
              </li>
            </ul>

            <div class="tab-content">
              <div class="tab-pane container active" id="tab-printer-testing">
                <form id="testPrintForm" class="mt-3">
                  <div class="mb-2">
                    <label for="printMode" class="form-label fw-semibold">Print Mode</label>
                    <select class="form-select" id="printMode" required>
                      <option value="network">Network</option>
                      <option value="usb">USB</option>
                      <!-- <option value="serial">Serial</option> -->
                      <!-- <option value="bluetooth">Bluetooth</option> -->
                      <!-- <option value="file">File</option> -->
                    </select>
                  </div>
                  <div class="mb-2" id="divPrintModeUSB" style="display:none;">
                    <button type="button" id="btnShowUSB" class="btn btn-sm btn-info rounded-pill shadow-sm">
                      <i class="fa-brands fa-usb"></i> Show USB Connected
                    </button>
                    <button type="button" id="btnInfoUSB" class="btn btn-sm btn-danger rounded-pill shadow-sm">
                      <i class="fa fa-info"></i>
                    </button>
                  </div>
                  <div class="mb-2" id="divPrinterName">
                    <label for="printerName" class="form-label fw-semibold" id="cptPrinterName">Printer IP</label>
                    <input type="text" class="form-control" id="printerName" placeholder="e.g. 192.168.1.110" value="192.168.1.110" />
                  </div>
                  <div class="mb-2" id="divPrinterPort">
                    <label for="printerPort" class="form-label fw-semibold" id="cptPrinterPort">Printer Port</label>
                    <input type="text" class="form-control" id="printerPort" placeholder="9100" value="9100" />
                  </div>
                  <div class="mb-2">
                    <label for="printText" class="form-label fw-semibold">Text To Print</label>
                    <textarea class="form-control" rows="3" id="printText">----TEST----</textarea>
                  </div>

                  <div class="d-flex gap-2">
                    <button type="button" id="btnTestPrint" class="btn btn-success rounded-pill shadow-sm">
                      <i class="fa fa-print"></i> Test Print
                    </button>
                  </div>
                </form>
              </div>
              <div class="tab-pane container fade" id="tab-edc-testing">
                <form id="testEDCForm" class="mt-3">
                  <div class="mb-2">
                    <label for="modeEDC" class="form-label fw-semibold">EDC Mode</label>
                    <select class="form-select" id="modeEDC" required>
                      <option value="network">Network</option>
                      <option value="usb" selected>USB</option>
                    </select>
                  </div>
                  <div class="mb-2" id="divEDCModeUSB">
                    <button type="button" id="btnShowEDCUSB" class="btn btn-sm btn-info rounded-pill shadow-sm">
                      <i class="fa-brands fa-usb"></i> Show USB/Port Connected
                    </button>
                  </div>
                  <div class="mb-2" id="divIpEDC" style="display:none;">
                    <label for="ipEDC" class="form-label fw-semibold" id="cptIpEDC">EDC IP</label>
                    <input type="text" class="form-control" id="ipEDC" placeholder="e.g. 192.168.1.110" value="192.168.1.110" />
                  </div>
                  <div class="mb-2" id="divPortEDC">
                    <label for="portEDC" class="form-label fw-semibold" id="cptPortEDC">EDC USB/Port</label>
                    <input type="text" class="form-control" id="portEDC" placeholder="" value="" style="background-color: #F5F2F2;" readonly />
                  </div>
                  <div class="mb-2">
                    <label for="typeEDC" class="form-label fw-semibold">EDC Type</label>
                    <select class="form-select" id="typeEDC" required>
                      <option value="PAX A920 GHL">PAX A920 GHL</option>
                      <!-- <option value="PAX A920 APOS">PAX A920 APOS</option> -->
                    </select>
                  </div>
                  <div class="mb-2" style="display:none;">
                    <label for="actionEDC" class="form-label fw-semibold">Action</label>
                    <select class="form-select" id="actionEDC" required>
                      <option value="sale">sale</option>
                    </select>
                  </div>
                  <div class="mb-2">
                    <label for="amountEDC" class="form-label fw-semibold">Amount</label>
                    <input type="text" class="form-control" id="amountEDC" placeholder="" value="1.00" />
                  </div>
                  <div class="mb-2" style="display:none;">
                    <label for="cashierEDC" class="form-label fw-semibold">Cashier</label>
                    <input type="text" class="form-control" id="cashierEDC" placeholder="1" value="1" />
                  </div>
                  <div class="mb-2" style="display:none;">
                    <label for="transactionIdEDC" class="form-label fw-semibold">Transaction ID</label>
                    <input type="text" class="form-control" id="transactionIdEDC" placeholder="e.g. CUSINV001" value="CUSINV001" />
                  </div>
                  <div class="d-flex gap-2">
                    <button type="button" id="btnTestEDC" class="btn btn-success rounded-pill shadow-sm">
                      <i class="fa fa-credit-card"></i> Test EDC
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- USB Connected Modal -->
    <div class="modal fade" id="USBConnectedModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">USB Devices</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <table class="table table-bordered table-striped table-sm">
              <thead class="table-light">
                <tr>
                  <th>VID</th>
                  <th>PID</th>
                  <th>Manufacturer</th>
                  <th>Product</th>
                  <th style="text-align: center;">Action</th>
                </tr>
              </thead>
              <tbody id="usbTableBody"></tbody>
            </table>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- USB Info Modal -->
    <div class="modal fade" id="USBInfoModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">USB Configuration</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div id="content-usb-info-modal"></div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- USB Connected EDC Modal -->
    <div class="modal fade" id="USBConnectedEDCModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">USB/Port Devices</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <table class="table table-bordered table-striped table-sm">
              <thead class="table-light">
                <tr>
                  <th>COM Port</th>
                  <th>Manufacturer</th>
                  <th>Vendor ID</th>
                  <th>Product ID</th>
                  <th style="text-align: center;">Action</th>
                </tr>
              </thead>
              <tbody id="usbEDCTableBody"></tbody>
            </table>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- QUEUE LISTING -->
    <div class="row justify-content-center mb-4">
      <div class="col-md-12">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4">
            
            <!-- Header bar -->
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
              <h5 class="card-title fw-bold mb-0">Print Queue</h5>
              <button id="btnDeleteFailed" class="btn btn-danger rounded-pill shadow-sm">
                <i class="fa fa-trash"></i> Delete All Failed
              </button>
            </div>

            <!-- Grid.js table will be rendered here -->
            <div id="queueTable"></div>

            <!-- Modal for Print Text Detail -->
            <div class="modal fade" id="textModal" tabindex="-1" aria-labelledby="textModalLabel" aria-hidden="true">
              <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content rounded-4">
                  <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="textModalLabel">Print Text Detail</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                  </div>
                  <div class="modal-body">
                    <span class="badge text-bg-primary mb-2" id="modalTitle">Info</span>
                    <div id="modalContent" class="text-center"></div>
                  </div>
                  <div class="modal-footer">
                    <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Close</button>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- LOGS -->
    <div id="log" class="console-log"></div>
    <div class="row mt-3">
      <div class="col-sm-12">
        <button class="btn btn-danger rounded-pill shadow-sm" id="btnClearLog">
          <i class="fa fa-times"></i> Clear Log
        </button>
      </div>
    </div>
  </div>

  <!-- Bootstrap -->
  <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Grid.js -->
  <link href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>

  <!-- SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Renderer -->
  <script src="./src/renderer.js"></script>
</body>
</html>
